services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: newsqa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsqa
      POSTGRES_PASSWORD: newsqa
      POSTGRES_DB: newsqa
    ports:
      # Host 55432 -> container 5432 to avoid clashing with native Postgres (5432/5433 taken)
      - "55432:5432"
    volumes:
      - newsqa-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsqa -d newsqa"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: newsqa-redis
    restart: unless-stopped
    ports:
      # Host 6380 -> container 6379 to avoid clashing with a native Windows
      # Redis 3.0.504 service that holds 6379 (too old for BullMQ, needs >=5).
      - "6380:6379"
    volumes:
      - newsqa-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Embedding host (Phase 2). Separate from OpenRouter on purpose — see plan.
  # Model bge-m3 must be pulled once: `docker exec newsqa-ollama ollama pull bge-m3`
  # This instance serves CHAT/RETRIEVAL embeds (latency-sensitive).
  ollama:
    image: ollama/ollama:latest
    container_name: newsqa-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - newsqa-ollama:/root/.ollama

  # Dedicated Ollama for INGESTION embeds so background nạp does not starve the
  # chat instance (both run bge-m3 -> vector(1024)). Pull once:
  # `docker exec newsqa-ollama-ingest ollama pull bge-m3`
  ollama-ingest:
    image: ollama/ollama:latest
    container_name: newsqa-ollama-ingest
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - newsqa-ollama-ingest:/root/.ollama

  # ---- Application (opt-in via `docker compose --profile app up -d --build`) ----
  # Default `docker compose up -d` still starts only infra. The app services use
  # in-cluster hostnames (postgres/redis/ollama) instead of localhost.
  backend:
    build: ./server
    container_name: newsqa-backend
    profiles: ["app"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Load secrets/models (OPENROUTER_API_KEY, LLM_*, APP_*) from server/.env…
    env_file:
      - ./server/.env
    # …then override the networking vars with in-cluster hostnames (environment
    # takes precedence over env_file).
    environment:
      DATABASE_URL: postgresql://newsqa:newsqa@postgres:5432/newsqa?schema=public
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      EMBEDDING_BASE_URL: http://ollama:11434
      EMBEDDING_INGEST_BASE_URL: http://ollama-ingest:11434
      INGEST_ON_BOOT: "true"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: newsqa-frontend
    profiles: ["app"]
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3001:3001"

volumes:
  newsqa-pgdata:
  newsqa-redisdata:
  newsqa-ollama:
  newsqa-ollama-ingest:
